<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C Online Compiler | CodeStart</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Consolas:wght@400;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="languages.css">

  <!-- Compiler Specific CSS -->
  <link rel="stylesheet" href="c-compiler.css">

  <!-- Puter.js for Serverless AI access -->
  <script src="https://js.puter.com/v2/"></script>
</head>

<body>

  <!-- Dynamic Background Elements -->
  <div class="bg-shape shape-1" style="background: radial-gradient(circle, rgba(0,89,156,0.2) 0%, transparent 70%);">
  </div>
  <div class="bg-shape shape-2" style="background: radial-gradient(circle, rgba(57,73,171,0.2) 0%, transparent 70%);">
  </div>
  <div class="bg-shape shape-3" style="background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);">
  </div>

  <!-- Header -->
  <header>
    <div class="container header-container">
      <div class="logo">
        <i class="fa-solid fa-c" style="color: #3949ab;"></i> C<span>Compiler</span>
      </div>
      <button onclick="goBack()" class="btn-home">
        <i class="fa-solid fa-arrow-left"></i> Back to Notes
      </button>
    </div>
  </header>

  <!-- Compiler Area -->
  <div class="compiler-wrapper">
    <div class="compiler-container fade-in-up">
      <div class="glass-compiler-panel">

        <div class="compiler-header">
          <span><i class="fa-solid fa-c" style="color:#64b5f6; margin-right:5px;"></i> main.c</span>
          <button class="btn-run" onclick="runit()" id="runBtn"><i class="fa-solid fa-play"></i> Run Code</button>
        </div>

        <div class="compiler-body">
          <div class="editor-pane">
            <textarea id="code" spellcheck="false" autocomplete="off">#include <stdio.h>

int main() {
    printf("Welcome to CodeStart C Compiler!\n");
    printf("Let's write some C code.\n");
    
    for(int i = 1; i <= 3; i++) {
        printf("Counting: %d\n", i);
    }
    
    return 0;
}</textarea>
          </div>

          <div class="middle-resizer"></div>

          <div class="output-pane">
            <div class="output-header">Terminal Output</div>
            <div id="terminal">
              <div id="output"></div>
              <div class="spinner" id="loadingSpinner" style="display:none; color: #64b5f6; margin-top: 10px;"><i
                  class="fa-solid fa-circle-notch fa-spin"></i> Executing...</div>
            </div>
            <!-- Standard Input Box for C Compiler -->
            <div class="stdin-pane">
              <div class="output-header">Standard Input (Provide before run)</div>
              <textarea id="stdinBox" spellcheck="false"
                placeholder="Enter input for scanf, gets, etc. here before clicking Run..."></textarea>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- AI Chat Button -->
  <button class="ai-chat-btn" onclick="toggleChat()" aria-label="Ask AI Assistant">
    <i class="fa-solid fa-robot"></i>
  </button>

  <!-- AI Chat Panel -->
  <div class="ai-chat-panel" id="aiChatPanel">
    <div class="chat-header">
      <div class="chat-title">
        <i class="fa-solid fa-robot"></i> CodeStart AI Tutor
      </div>
      <button class="chat-close" onclick="toggleChat()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="msg msg-ai">Hello! 👋 I'm your AI coding tutor. Stuck on a C programming problem or encountering an
        error? Ask me anything!</div>
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
    <div class="chat-input-area">
      <input type="text" class="chat-input" id="chatInput" placeholder="Type your question..."
        onkeypress="handleKeyPress(event)">
      <button class="chat-send" onclick="sendMessage()">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
  </div>

  <script src="c-compiler.js"></script>

</body>

</html>
