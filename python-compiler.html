<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Online Compiler | CodeStart</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="languages.css">
  
  <!-- Puter.js for Serverless AI access -->
  <script src="https://js.puter.com/v2/"></script>
  
  <style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden; /* Prevent scrolling on body since compiler handles it */
        display: flex;
        flex-direction: column;
    }

    .compiler-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
        width: 100%;
        height: calc(100vh - 80px); /* Leave room for header */
        padding: 0;
        position: relative;
        z-index: 10;
        box-sizing: border-box;
    }

    header {
        position: relative;
        z-index: 20;
    }

    .compiler-container {
        flex: 1;
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 20px 20px 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
    }

    .glass-compiler-panel {
        flex: 1;
        background: rgba(17, 24, 39, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
        flex: 1;
    }

    /* Animation */
    .fade-in-up {
        animation: fadeInUp 0.8s ease-out forwards;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* --- AI Assistant UI --- */
    .ai-chat-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.5rem;
        box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        cursor: pointer;
        z-index: 100;
        transition: all 0.3s ease;
        border: none;
    }
    .ai-chat-btn:hover {
        transform: translateY(-5px) scale(1.05);
        box-shadow: 0 8px 25px rgba(124, 58, 237, 0.6);
    }
    
    .ai-chat-panel {
        position: fixed;
        bottom: 100px;
        right: 30px;
        width: 350px;
        height: 500px;
        background: rgba(17, 24, 39, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        transform: translateY(20px) scale(0.95);
        opacity: 0;
        pointer-events: none;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 99;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .ai-chat-panel.active {
        transform: translateY(0) scale(1);
        opacity: 1;
        pointer-events: all;
    }
    
    .chat-header {
        padding: 15px 20px;
        background: rgba(255, 255, 255, 0.05);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .chat-title {
        color: white;
        font-weight: 600;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .chat-title i {
        color: #a78bfa;
    }
    .chat-close {
        background: none;
        border: none;
        color: #9ca3af;
        cursor: pointer;
        font-size: 1.2rem;
        transition: color 0.2s;
    }
    .chat-close:hover {
        color: white;
    }
    
    .chat-messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    .chat-messages::-webkit-scrollbar {
        width: 6px;
    }
    .chat-messages::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
    }
    .msg {
        max-width: 85%;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 0.95rem;
        line-height: 1.4;
        word-wrap: break-word;
        overflow-wrap: break-word;
    }
    .msg-ai {
        background: rgba(255, 255, 255, 0.05);
        color: #e5e7eb;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .msg-user {
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
    }
    .msg code {
        background: rgba(0,0,0,0.3);
        padding: 2px 5px;
        border-radius: 4px;
        font-family: monospace;
        color: #93c5fd;
    }
    
    .chat-input-area {
        padding: 15px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        gap: 10px;
        background: rgba(0, 0, 0, 0.2);
    }
    .chat-input {
        flex: 1;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 10px 15px;
        color: white;
        font-family: inherit;
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.3s;
    }
    .chat-input:focus {
        border-color: #a78bfa;
    }
    .chat-send {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #4f46e5;
        color: white;
        border: none;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: background 0.3s;
    }
    .chat-send:hover {
        background: #4338ca;
    }
    .typing-indicator {
        display: none;
        align-self: flex-start;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        border-bottom-left-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .typing-dots {
        display: flex;
        gap: 4px;
        align-items: center;
        height: 10px;
    }
    .dot {
        width: 6px;
        height: 6px;
        background: #a78bfa;
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
    }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
  </style>
</head>

<body>

  <!-- Dynamic Background Elements -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <!-- Header -->
  <header>
    <div class="container header-container">
      <div class="logo">
        <i class="fa-brands fa-python"></i> Python<span>Compiler</span>
      </div>
      <button onclick="goBack()" class="btn-home">
        <i class="fa-solid fa-arrow-left"></i> Back to Notes
      </button>
    </div>
  </header>

  <!-- Compiler Area -->
  <div class="compiler-wrapper">
    <div class="compiler-container fade-in-up">
      <div class="glass-compiler-panel">
        <iframe src="https://onecompiler.com/embed/python?theme=dark" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <!-- AI Chat Button -->
  <button class="ai-chat-btn" onclick="toggleChat()" aria-label="Ask AI Assistant">
    <i class="fa-solid fa-robot"></i>
  </button>

  <!-- AI Chat Panel -->
  <div class="ai-chat-panel" id="aiChatPanel">
    <div class="chat-header">
      <div class="chat-title">
        <i class="fa-solid fa-robot"></i> CodeStart AI Tutor
      </div>
      <button class="chat-close" onclick="toggleChat()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="msg msg-ai">Hello! 👋 I'm your AI coding tutor. Stuck on a Python problem or encountering an error? Ask me anything!</div>
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
    <div class="chat-input-area">
      <input type="text" class="chat-input" id="chatInput" placeholder="Type your question..." onkeypress="handleKeyPress(event)">
      <button class="chat-send" onclick="sendMessage()">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
  </div>

  <script>
    function goBack() {
      // Go back to the notes page
      window.location.href = 'python/notes.html';
    }

    // --- AI Assistant Functionality ---
    const chatPanel = document.getElementById('aiChatPanel');
    const chatInput = document.getElementById('chatInput');
    const chatMessages = document.getElementById('chatMessages');
    const typingIndicator = document.getElementById('typingIndicator');

    function toggleChat() {
      chatPanel.classList.toggle('active');
      if (chatPanel.classList.contains('active')) {
        chatInput.focus();
      }
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter') {
        sendMessage();
      }
    }

    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      // Add User Message
      appendMessage(text, 'user');
      chatInput.value = '';

      // Show typing indicator
      chatMessages.appendChild(typingIndicator);
      typingIndicator.style.display = 'block';
      chatMessages.scrollTop = chatMessages.scrollHeight;

      // Call the real AI
      generateAIResponse(text);
    }

    function appendMessage(text, sender) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `msg msg-${sender}`;
      msgDiv.innerHTML = text;
      // Insert before tying indicator if it exists
      chatMessages.insertBefore(msgDiv, typingIndicator);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function generateAIResponse(query) {
      try {
        // System prompt to constrain the AI
        const systemPrompt = "You are a friendly, highly knowledgeable Python programming tutor called 'CodeStart AI'. You are helping a student who is currently using an online Python compiler. Keep your answers concise, accurate, and use HTML formatting (like <code> for code snippets, <b> for emphasis, and <br> for line breaks). Do not use Markdown, ONLY use HTML tags for formatting.";

        // Call Puter.js AI (which uses advanced LLMs under the hood, usually OpenAI)
        const response = await puter.ai.chat(
            `System: ${systemPrompt}\n\nUser: ${query}`
        );

        // Hide typing indicator and show response
        typingIndicator.style.display = 'none';
        
        // Puter returns the response in different formats depending on the backend, 
        // stringify or access the message content robustly.
        let finalMessage = typeof response === 'string' ? response : (response.message?.content || response.text || "I'm having trouble thinking right now.");
        
        // Convert basic markdown to HTML for safety since we instructed the AI to use HTML,
        // but it might still slip up.
        finalMessage = finalMessage.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
        
        appendMessage(finalMessage, 'ai');

      } catch (error) {
        console.error("AI Error:", error);
        typingIndicator.style.display = 'none';
        appendMessage("Sorry, I'm having trouble connecting to my brain right now. Please try asking again in a moment! (Error: " + error.message + ")", 'ai');
      }
    }
  </script>
</body>

</html>
