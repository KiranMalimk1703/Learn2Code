<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Online Compiler | CodeStart</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Consolas:wght@400;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="languages.css">
  
  <!-- Compiler Specific CSS -->
  <link rel="stylesheet" href="python-compiler.css">
  
  <!-- Puter.js for Serverless AI access -->
  <script src="https://js.puter.com/v2/"></script>
  
  <!-- Skulpt for executing Python natively inside the browser -->
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
</head>

<body>

  <!-- Dynamic Background Elements -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <!-- Header -->
  <header>
    <div class="container header-container">
      <div class="logo">
        <i class="fa-brands fa-python"></i> Python<span>Compiler</span>
      </div>
      <button onclick="goBack()" class="btn-home">
        <i class="fa-solid fa-arrow-left"></i> Back to Notes
      </button>
    </div>
  </header>

  <!-- Compiler Area -->
  <div class="compiler-wrapper">
    <div class="compiler-container fade-in-up">
      <div class="glass-compiler-panel">
        
        <div class="compiler-header">
          <span><i class="fa-brands fa-python" style="color:#facc15; margin-right:5px;"></i> main.py</span>
          <button class="btn-run" onclick="runit()"><i class="fa-solid fa-play"></i> Run Code</button>
        </div>
        
        <div class="compiler-body">
          <div class="editor-pane">
            <textarea id="code" spellcheck="false" autocomplete="off">print("Welcome to CodeStart Python Compiler!")
name = input("What is your name? ")
print(f"Hello, {name}! Let's write some Python code.")
for i in range(1, 4):
    print(f"Counting: {i}")</textarea>
          </div>
          
          <div class="output-pane">
            <div class="output-header">Terminal Output</div>
            <div id="terminal">
              <div id="output"></div>
              <input type="text" id="inputBox" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Terminal input...">
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- AI Chat Button -->
  <button class="ai-chat-btn" onclick="toggleChat()" aria-label="Ask AI Assistant">
    <i class="fa-solid fa-robot"></i>
  </button>

  <!-- AI Chat Panel -->
  <div class="ai-chat-panel" id="aiChatPanel">
    <div class="chat-header">
      <div class="chat-title">
        <i class="fa-solid fa-robot"></i> CodeStart AI Tutor
      </div>
      <button class="chat-close" onclick="toggleChat()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="msg msg-ai">Hello! 👋 I'm your AI coding tutor. Stuck on a Python problem or encountering an error? Ask me anything!</div>
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
    <div class="chat-input-area">
      <input type="text" class="chat-input" id="chatInput" placeholder="Type your question..." onkeypress="handleKeyPress(event)">
      <button class="chat-send" onclick="sendMessage()">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
  </div>

  <!-- External JS for Compiler and AI -->
  <script src="python-compiler.js"></script>

</body>

</html>
